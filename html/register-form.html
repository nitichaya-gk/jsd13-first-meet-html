<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก</title>
</head>
<body>

  <h1>สมัครสมาชิก</h1>

  <form>

    <label for="username">ชื่อผู้ใช้</label><br>
    <input type="text" id="username" name="username" placeholder="กรอกชื่อผู้ใช้"><br><br>

    <label for="password">รหัสผ่าน</label><br>
    <input type="password" id="password" name="password" placeholder="กรอกรหัสผ่าน"><br><br>

    <label for="email">อีเมล</label><br>
    <input type="email" id="email" name="email" placeholder="กรอกอีเมล" required><br><br>

    <label>เลือกแพ็กเกจ</label><br>
    <input type="radio" id="free" name="package" value="free">
    <label for="free">ฟรี (Free)</label><br>
    <input type="radio" id="premium" name="package" value="premium">
    <label for="premium">พรีเมียม (Premium)</label><br><br>

    <label>ความสนใจ</label><br>
    <input type="checkbox" id="movie" name="interest" value="movie">
    <label for="movie">ดูหนัง</label><br>
    <input type="checkbox" id="music" name="interest" value="music">
    <label for="music">ฟังเพลง</label><br>
    <input type="checkbox" id="game" name="interest" value="game">
    <label for="game">เล่นเกม</label><br><br>

    <button type="submit">ยืนยันการสมัคร</button>

  </form>

  <p>12 Ekkaluck (Nate/เน็ท)</p>

</body>
</html>
